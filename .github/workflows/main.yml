name: Instagram Auto-Reply Bot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      post_url:
        description: 'Instagram Post or Reel URL (Optional)'
        required: false
        type: string
      keyword:
        description: 'Trigger Keyword (Optional)'
        required: false
        type: string
      reply_text:
        description: 'Reply Text (Optional)'
        required: false
        type: string

# 1. ADDED THIS: Prevents multiple bots from running at the same time
concurrency:
  group: instagram-bot-state
  cancel-in-progress: false # Queues jobs instead of cancelling them so we don't miss comments

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run Agent Script
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          INPUT_POST_URL: ${{ github.event.inputs.post_url }}
          INPUT_KEYWORD: ${{ github.event.inputs.keyword }}
          INPUT_REPLY: ${{ github.event.inputs.reply_text }}
        run: python agent.py

      - name: Commit and push state files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add rules.json processed_comments.json || true
          
          if git diff-index --quiet HEAD; then
            echo "🔄 No new comments processed or rules added. Skipping commit."
          else
            git commit -m "chore: update bot state (rules/processed comments) [skip ci]"
            
            # 2. ADDED '-X theirs': Automatically resolves conflicts by keeping the bot's newest data
            git pull --rebase -X theirs origin main
            
            git push
            echo "✅ State successfully pushed to repository."
          fi
